<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Doris Zarrinnam • Künstlerin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .gallery-img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      transition: transform 0.4s ease; 
    }
    .gallery-img:hover { 
      transform: scale(1.08); 
    }
    .art-card {
      transition: all 0.3s ease;
    }
    .art-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
    }
    #modal {
      display: none;
    }
    #modal.open {
      display: flex;
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

  <div class="max-w-7xl mx-auto px-6 py-12">
    <h1 class="text-5xl md:text-6xl font-light text-center tracking-wide mb-2">DORIS ZARRINNAM</h1>
    <p class="text-center text-amber-300 text-xl mb-12">Künstlerin • Malerei</p>

    <div class="mb-10">
      <h2 id="title" class="text-3xl font-light text-center mb-6">Werke • chronologisch</h2>
      
      <!-- Suche -->
      <div class="max-w-md mx-auto mb-8">
        <input 
          id="searchInput"
          type="text" 
          placeholder="Suchen nach Jahr oder Titel (z.B. 1992, Prisma...)"
          class="w-full bg-zinc-900 border border-zinc-700 focus:border-amber-400 rounded-2xl px-5 py-3 text-zinc-100 placeholder-zinc-500 focus:outline-none">
      </div>
    </div>

    <div id="gallery" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6"></div>
  </div>

  <!-- Einfaches Vollbild-Modal -->
  <div id="modal" class="fixed inset-0 bg-black/95 z-50 hidden items-center justify-center p-4">
    <div class="relative max-w-[95vw] max-h-[95vh]">
      <button onclick="closeModal()" 
              class="absolute -top-4 -right-4 bg-zinc-900 text-white w-10 h-10 rounded-full flex items-center justify-center text-3xl hover:bg-amber-300 hover:text-black z-10">×</button>
      <img id="modalImg" src="" alt="" class="max-h-[90vh] max-w-full object-contain rounded-xl shadow-2xl">
      <p id="modalCaption" class="text-center text-zinc-400 mt-4 text-sm"></p>
    </div>
  </div>

  <script>
    const imageFiles = [
      "1971 - persische Landschaft.JPG",
      "1992 - Blaue Engel.JPG",
      "1992 - Erlebnis '85 Aachen.JPG",
      "1992 - Feuerwerk.JPG",
      "1992 - Flaggenbaum.JPG",
      "1992 - Friedensgedanken.JPG",
      "1992 - Glühwurm - Glühwein.JPG",
      "1992 - Hoffnung.JPG",
      "1992 - Jahreszeiten.JPG",
      "1992 - Lebenslauf.JPG",
      "1992 - Mut.JPG",
      "1992 - O.T..JPG",
      "1992 - Osterstrauß.JPG",
      "1992 - Prisma.JPG",
      "1992 - Sehnsucht.JPG",
      "1992 - W.JPG",
      "1992 - Zuversicht.JPG",
      // ... (deine komplette Liste – ich habe sie hier gekürzt, füge alle ein wie in deiner Datei)
      "2020 - Weg der Liebe.JPG",
      "TSS04766-bearbeitet.JPG",
      "TSS04855-bearbeitet.JPG",
      "TSS04947-bearbeitet.JPG"
    ];

    let allImages = [];

    function createImageObjects() {
      allImages = imageFiles.map(name => {
        const match = name.match(/(\d{4})/);
        const year = match ? parseInt(match[1]) : 9999;
        return { name, year, url: name };
      }).sort((a, b) => a.year - b.year || a.name.localeCompare(b.name));
    }

    function renderGallery(images) {
      const gallery = document.getElementById("gallery");
      gallery.innerHTML = "";

      document.getElementById("title").textContent = `Werke • chronologisch (${images.length} Werke)`;

      images.forEach((img, index) => {
        const div = document.createElement("div");
        div.className = "art-card cursor-pointer overflow-hidden rounded-2xl bg-zinc-900 aspect-square border border-zinc-800";
        div.innerHTML = `
          <img src="${img.url}" 
               class="gallery-img" 
               alt="${img.name}"
               loading="lazy"
               onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 200 200%27%3E%3Crect width=%27200%27 height=%27200%27 fill=%27%23333%27/%3E%3Ctext x=%27100%27 y=%27100%27 text-anchor=%27middle%27 dy=%27.3em%27 fill=%27%23999%27 font-size=%2712%27%3EBild nicht gefunden%3C/text%3E%3C/svg%27'; this.alt='Fehler';">
          <p class="text-xs text-zinc-500 mt-3 text-center px-2 truncate">${img.name}</p>
        `;
        div.onclick = () => openModal(index);
        gallery.appendChild(div);
      });
    }

    function setupSearch() {
      const input = document.getElementById("searchInput");
      input.addEventListener("input", () => {
        const term = input.value.toLowerCase().trim();
        if (!term) {
          renderGallery(allImages);
          return;
        }
        const filtered = allImages.filter(img => 
          img.name.toLowerCase().includes(term) || 
          img.year.toString().includes(term)
        );
        renderGallery(filtered);
      });
    }

    let currentIndex = 0;

    function openModal(index) {
      currentIndex = index;
      const img = allImages[currentIndex];
      document.getElementById("modalImg").src = img.url;
      document.getElementById("modalCaption").textContent = img.name;
      document.getElementById("modal").classList.add("open");
      document.getElementById("modal").classList.remove("hidden");
    }

    function closeModal() {
      const modal = document.getElementById("modal");
      modal.classList.remove("open");
      setTimeout(() => modal.classList.add("hidden"), 300);
    }

    // Tastatur-Support
    document.addEventListener("keydown", (e) => {
      if (document.getElementById("modal").classList.contains("open")) {
        if (e.key === "Escape") closeModal();
        if (e.key === "ArrowRight") {
          currentIndex = (currentIndex + 1) % allImages.length;
          const img = allImages[currentIndex];
          document.getElementById("modalImg").src = img.url;
          document.getElementById("modalCaption").textContent = img.name;
        }
        if (e.key === "ArrowLeft") {
          currentIndex = (currentIndex - 1 + allImages.length) % allImages.length;
          const img = allImages[currentIndex];
          document.getElementById("modalImg").src = img.url;
          document.getElementById("modalCaption").textContent = img.name;
        }
      }
    });

    // Start
    window.onload = () => {
      createImageObjects();
      renderGallery(allImages);
      setupSearch();
    };
  </script>
</body>
</html>
