<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doris Zarrinnam – Malerei</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e0e;
      --bg2: #161616;
      --gold: #c9a96e;
      --text: #e8e0d4;
      --muted: #7a7068;
      --border: #2a2520;
    }
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      line-height: 1.6;
    }
    header {
      text-align: center;
      padding: 70px 20px 40px;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 7vw, 5rem);
      font-weight: 300;
      letter-spacing: 0.05em;
    }
    h1 em { color: var(--gold); font-style: italic; }

    .search-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(14,14,14,0.95);
      backdrop-filter: blur(12px);
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    #searchInput {
      width: 100%;
      max-width: 520px;
      padding: 12px 20px;
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 15px;
      border-radius: 4px;
      outline: none;
    }
    #searchInput:focus { border-color: var(--gold); }

    .gallery {
      padding: 40px 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
      max-width: 1600px;
      margin: 0 auto;
    }
    .art-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .art-card:hover {
      transform: translateY(-6px);
      border-color: var(--gold);
    }
    .art-card img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.4s ease;
    }
    .art-card:hover img { transform: scale(1.05); }
    .info {
      padding: 12px 14px;
    }
    .title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 15px;
      margin-bottom: 4px;
    }
    .year {
      font-size: 12px;
      color: var(--gold);
      letter-spacing: 1px;
    }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,8,6,0.98);
      align-items: center;
      justify-content: center;
      z-index: 1000;
      flex-direction: column;
    }
    #lightbox.open { display: flex; }
    .lb-content {
      position: relative;
      max-width: 94vw;
      max-height: 88vh;
    }
    #lbImg {
      max-width: 100%;
      max-height: 88vh;
      object-fit: contain;
      transform-origin: center center;
      transition: transform 0.08s linear;
      cursor: grab;
      user-select: none;
    }
    .lb-controls {
      position: absolute;
      bottom: -65px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      background: var(--bg2);
      padding: 10px 18px;
      border-radius: 30px;
      border: 1px solid var(--border);
    }
    .lb-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 19px;
    }
    .lb-btn:hover {
      background: var(--gold);
      color: #0e0e0e;
      border-color: var(--gold);
    }
    .lb-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(20,20,20,0.8);
      color: white;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      font-size: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
    }
    #lbPrev { left: 20px; }
    #lbNext { right: 20px; }
    .lb-close {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 36px;
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      z-index: 20;
    }

    footer {
      background: var(--bg2);
      padding: 70px 20px 50px;
      text-align: center;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size
