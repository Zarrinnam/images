<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doris Zarrinnam – Malerei</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --bg2: #161616;
      --gold: #c9a96e;
      --gold-light: #e2c99a;
      --text: #e8e0d4;
      --text-muted: #7a7068;
      --border: #2a2520;
      --overlay: rgba(10,8,6,0.97);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER, SEARCH, GALLERY etc. bleiben unverändert ── */
    header {
      position: relative;
      text-align: center;
      padding: 70px 20px 50px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #111008 0%, var(--bg) 100%);
    }

    .header-ornament {
      display: block;
      font-size: 11px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 18px;
      opacity: 0.8;
    }

    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.8rem, 6vw, 5rem);
      letter-spacing: 0.08em;
      color: var(--text);
      line-height: 1.1;
    }

    header h1 em {
      font-style: italic;
      color: var(--gold-light);
    }

    .header-subtitle {
      margin-top: 14px;
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .gold-line {
      width: 60px;
      height: 1px;
      background: var(--gold);
      margin: 28px auto 0;
      opacity: 0.6;
    }

    .search-section {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(14,14,14,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 220px;
      max-width: 520px;
    }

    .search-wrap svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.4;
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 14px;
      letter-spacing: 0.05em;
      padding: 11px 16px 11px 44px;
      outline: none;
      transition: border-color 0.3s;
    }

    #searchInput:focus { border-color: var(--gold); }
    #searchInput::placeholder { color: var(--text-muted); }

    .year-filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .year-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'Jost', sans-serif;
      font-size: 12px;
      letter-spacing: 1px;
      padding: 6px 14px;
      cursor: pointer;
      border-radius: 1px;
      transition: all 0.25s;
    }

    .year-btn:hover { border-color: var(--gold); color: var(--gold); }
    .year-btn.active { background: var(--gold); border-color: var(--gold); color: #0e0e0e; font-weight: 500; }

    .result-count {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 1px;
      margin-left: auto;
      white-space: nowrap;
    }

    .gallery-section { padding: 36px 20px 60px; }

    #gallery {
      columns: 5 220px;
      gap: 12px;
    }

    .art-card {
      break-inside: avoid;
      margin-bottom: 12px;
      position: relative;
      cursor: pointer;
      overflow: hidden;
      background: var(--bg2);
      border: 1px solid var(--border);
      transition: transform 0.3s ease, border-color 0.3s ease;
    }

    .art-card:hover {
      transform: translateY(-3px);
      border-color: var(--gold);
    }

    .art-card img {
      display: block;
      width: 100%;
      height: auto;
      transition: transform 0.5s ease;
    }
